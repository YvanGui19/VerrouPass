# Configuration Nginx pour VerrouPass
#
# Instructions d'installation:
# 1. Remplacer "verroupass.votredomaine.com" par votre nom de domaine
# 2. Installer le snippet de security headers :
#      sudo cp scripts/nginx-snippets/verroupass-security-headers.conf \
#             /etc/nginx/snippets/verroupass-security-headers.conf
# 3. Copier ce fichier vers /etc/nginx/sites-available/verroupass
# 4. Créer le lien symbolique: sudo ln -s /etc/nginx/sites-available/verroupass /etc/nginx/sites-enabled/
# 5. Tester la config: sudo nginx -t
# 6. Recharger nginx: sudo systemctl reload nginx
#
# IMPORTANT - les `include snippets/verroupass-security-headers.conf;` sont
# répétés dans CHAQUE bloc qui contient un `add_header` (location /index.html,
# location ~* assets, server level). C'est volontaire : nginx hérite les
# add_header du parent UNIQUEMENT si le bloc enfant n'a aucun add_header.
# Sinon les headers du parent sont silencieusement ignorés pour cette location.

server {
    listen 80;
    listen [::]:80;
    server_name verroupass.votredomaine.com;

    # Redirection vers HTTPS (sera configuré après l'installation de Let's Encrypt)
    # return 301 https://$server_name$request_uri;

    # Client (React App - fichiers statiques)
    root /var/www/verroupass/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache pour les assets statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include snippets/verroupass-security-headers.conf;
        }

        # Pas de cache pour index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            include snippets/verroupass-security-headers.conf;
        }
    }

    # Téléchargements (CLI binary, etc.) — servis depuis un dossier hors du root SPA
    # Sans ce bloc, /downloads/* tombe sur le try_files du SPA et renvoie index.html.
    location /downloads/ {
        alias /var/www/verroupass/downloads/;
        autoindex off;
        add_header Cache-Control "public, max-age=300" always;
        gzip off;
        include snippets/verroupass-security-headers.conf;
    }

    # API Backend (proxy vers Node.js)
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # Headers pour le proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # ATTENTION DÉPLOIEMENT
    # Cet `include` doit être placé UNIQUEMENT dans le bloc `listen 443 ssl` de
    # votre config de prod (généré par Certbot dans /etc/nginx/sites-available/
    # verroupass). Le bloc port 80 ne doit faire qu'une redirection vers HTTPS,
    # sans HSTS (le snippet contient HSTS).
    # ========================================================================

    # Security Headers (HSTS, CSP, X-Frame-Options, Referrer-Policy, etc.)
    # Le snippet est aussi inclus dans location = /index.html et location assets
    # ci-dessus, parce qu'un add_header dans un bloc enfant supprime ceux du
    # parent. Voir scripts/nginx-snippets/verroupass-security-headers.conf.
    include snippets/verroupass-security-headers.conf;

    # Limite de taille des uploads
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/verroupass_access.log;
    error_log /var/log/nginx/verroupass_error.log warn;

    # Désactiver l'affichage de la version Nginx
    server_tokens off;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}

