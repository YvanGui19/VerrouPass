# Configuration Nginx pour VerrouPass
#
# Instructions d'installation:
# 1. Remplacer "verroupass.votredomaine.com" par votre nom de domaine
# 2. Copier ce fichier vers /etc/nginx/sites-available/verroupass
# 3. Créer le lien symbolique: sudo ln -s /etc/nginx/sites-available/verroupass /etc/nginx/sites-enabled/
# 4. Tester la config: sudo nginx -t
# 5. Recharger nginx: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name verroupass.votredomaine.com;

    # Redirection vers HTTPS (sera configuré après l'installation de Let's Encrypt)
    # return 301 https://$server_name$request_uri;

    # Client (React App - fichiers statiques)
    root /var/www/verroupass/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache pour les assets statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Pas de cache pour index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # API Backend (proxy vers Node.js)
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # Headers pour le proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # ATTENTION DÉPLOIEMENT
    # Tous les "add_header" ci-dessous doivent être placés UNIQUEMENT dans le
    # bloc `listen 443 ssl` de votre config de prod (généré par Certbot dans
    # /etc/nginx/sites-available/verroupass). Le bloc port 80 ne doit faire
    # qu'une redirection vers HTTPS, sans HSTS.
    # ========================================================================

    # Security Headers
    # HSTS : déploiement progressif recommandé.
    # - Phase 1 (test, 1 jour) :   max-age=300
    # - Phase 2 (1 semaine) :      max-age=86400; includeSubDomains
    # - Phase 3 (engagement) :     max-age=63072000; includeSubDomains; preload
    # Vérifier AVANT la phase 2 que tous les sous-domaines de yvangui.fr supportent HTTPS
    # (sinon includeSubDomains les rend inaccessibles pendant max-age côté visiteurs).
    # `preload` engage l'inscription à hstspreload.org : retrait long. À ne mettre qu'en
    # toute connaissance de cause.
    add_header Strict-Transport-Security "max-age=300" always;

    # CSP : empêche tout script externe ou inline non autorisé. Mitigation principale
    # contre l'injection de keylogger en cas de compromission d'une dépendance npm.
    # 'unsafe-inline' sur style-src est nécessaire pour Tailwind/Vite qui injectent du CSS.
    # fonts.googleapis.com / fonts.gstatic.com : utilisés par index.html pour les polices.
    # TODO: self-hoster les polices pour éliminer cette dépendance externe.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Limite de taille des uploads
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/verroupass_access.log;
    error_log /var/log/nginx/verroupass_error.log warn;

    # Désactiver l'affichage de la version Nginx
    server_tokens off;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}

