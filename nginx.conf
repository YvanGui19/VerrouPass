# Configuration Nginx pour VerrouPass
#
# Instructions d'installation:
# 1. Remplacer "verroupass.votredomaine.com" par votre nom de domaine
# 2. Copier ce fichier vers /etc/nginx/sites-available/verroupass
# 3. Créer le lien symbolique: sudo ln -s /etc/nginx/sites-available/verroupass /etc/nginx/sites-enabled/
# 4. Tester la config: sudo nginx -t
# 5. Recharger nginx: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name verroupass.votredomaine.com;

    # Redirection vers HTTPS (sera configuré après l'installation de Let's Encrypt)
    # return 301 https://$server_name$request_uri;

    # Client (React App - fichiers statiques)
    root /var/www/verroupass/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache pour les assets statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Pas de cache pour index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # API Backend (proxy vers Node.js)
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # Headers pour le proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Limite de taille des uploads
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/verroupass_access.log;
    error_log /var/log/nginx/verroupass_error.log warn;

    # Désactiver l'affichage de la version Nginx
    server_tokens off;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}

