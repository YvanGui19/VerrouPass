# Security headers for VerrouPass
#
# A installer dans /etc/nginx/snippets/verroupass-security-headers.conf
# Doit etre inclus :
#   - au niveau du bloc server (port 443)
#   - dans location = /index.html (sinon les add_header du parent sont ignores)
#   - dans location ~* assets (meme raison)
#
# HSTS : deploiement progressif recommande.
#   - Phase 1 (test, 5 min)  : max-age=300
#   - Phase 2 (1 jour)       : max-age=86400; includeSubDomains
#   - Phase 3 (engagement)   : max-age=63072000; includeSubDomains; preload
# Verifier que tous les sous-domaines de yvangui.fr supportent HTTPS avant
# d'ajouter `includeSubDomains`. `preload` engage l'inscription a
# hstspreload.org dont le retrait peut prendre des mois.
add_header Strict-Transport-Security "max-age=86400; includeSubDomains" always;

# CSP : empeche tout script externe ou inline non autorise. Mitigation
# principale contre l'injection de keylogger en cas de compromission d'une
# dependance npm. 'unsafe-inline' sur style-src est necessaire pour Tailwind
# /Vite qui injectent du CSS. fonts.googleapis.com / fonts.gstatic.com sont
# utilises par index.html. TODO: self-hoster les polices pour eliminer cette
# dependance externe.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
